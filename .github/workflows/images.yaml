name: Container Images

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  PLATFORMS: linux/amd64

jobs:
  nginx:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    env:
      PLATFORMS: linux/amd64
      # PLATFORMS: linux/amd64,linux/arm,linux/arm64
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          version: latest
          platforms: ${{ env.PLATFORMS }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push nginx base image
        run: |
          export TAG=$(cat images/nginx/TAG)
          cd images/nginx/rootfs && docker buildx build \
            --platform=${{ env.PLATFORMS }} \
            --push \
            -t ghcr.io/krcoldstorage/ingress-nginx/nginx:${TAG} .

      - name: Build controller images
        run: |
          export TAG=$(cat images/nginx/TAG)
          make \
            BASE_IMAGE=ghcr.io/krcoldstorage/ingress-nginx/nginx:${TAG} \
            clean-image build image image-chroot

      - name: Tag controller images
        run: |
          export TAG=$(cat images/nginx/TAG)
          docker tag \
            us-central1-docker.pkg.dev/k8s-staging-images/ingress-nginx/controller:${TAG} \
            ghcr.io/krcoldstorage/ingress-nginx/ingress-nginx-controller:${TAG}
          docker tag \
            us-central1-docker.pkg.dev/k8s-staging-images/ingress-nginx/controller-chroot:${TAG} \
            ghcr.io/krcoldstorage/ingress-nginx/ingress-nginx-controller-chroot:${TAG}

      - name: Push controller images
        run: |
          export TAG=$(cat images/nginx/TAG)
          docker push ghcr.io/krcoldstorage/ingress-nginx/ingress-nginx-controller:${TAG}
          docker push ghcr.io/krcoldstorage/ingress-nginx/ingress-nginx-controller-chroot:${TAG}
